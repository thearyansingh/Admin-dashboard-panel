version: '3.8'

services:
  database:
    image: mongo:6.0
    container_name: auth-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - auth-network

  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: auth-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URL=mongodb://database:27017/ErpDb
      - VERIFY_TOKEN=aryanSingh
      - CORS_ORIGIN=http://localhost
    depends_on:
      - database
    networks:
      - auth-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: auth-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - auth-network

networks:
  auth-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
